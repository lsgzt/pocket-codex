name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix Gradle Wrapper
        shell: bash
        working-directory: PocketDev
        run: |
          rm -f gradle/wrapper/gradle-wrapper.jar
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar
      - name: Grant execute permission for gradlew
        run: chmod +x PocketDev/gradlew

      - name: Build Release APK
        working-directory: PocketDev
        run: ./gradlew app:assembleRelease

      - name: Find and verify APK
        working-directory: PocketDev
        run: |
          echo "Looking for APK files..."
          find . -name "*.apk" -type f
          ls -la app/build/outputs/apk/release/ || true
      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PocketDev-Release-APK
          path: PocketDev/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Build Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: PocketDev APK" >> $GITHUB_STEP_SUMMARY
          find PocketDev -name "*.apk" -type f 2>/dev/null | head -5 | while read f; do
            echo "- Found APK: $f" >> $GITHUB_STEP_SUMMARY
          done
